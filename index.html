<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKAR - Herbal Ointment</title>
    <script type="module" src="./src/js/main.js"></script>
</head>
<body class="font-sans text-cream bg-plum-dark antialiased selection:bg-rose selection:text-white">

    <!-- HERO SECTION -->
    <header class="relative w-full h-[100svh] flex flex-col justify-end px-6 md:px-12 pb-16 md:pb-24">
        <div class="absolute inset-0 z-0">
            <img src="./asset/tb 2.jpg" alt="SEKAR Hair Mask" class="w-full h-full object-cover object-center" />
            <div class="absolute inset-0 bg-gradient-to-t from-plum/90 via-plum/40 to-transparent pointer-events-none"></div>
        </div>

        <div class="relative z-10 max-w-4xl" data-aos="fade-up">
            <h1 class="font-serif italic text-5xl sm:text-6xl md:text-8xl lg:text-9xl text-cream leading-none tracking-tight mb-2">SEKAR</h1>
            <p class="font-sans text-base sm:text-lg md:text-xl text-rose tracking-[0.2em] uppercase mb-6 sm:mb-8">Hair Mask</p>
            
            <hr class="w-12 sm:w-16 border-gold/50 mb-6">

            <p class="font-sans text-sm sm:text-base md:text-lg text-cream/90 max-w-lg mb-8 sm:mb-10 leading-relaxed font-light">
                Masker rambut alami premium dari limbah canang Bali, diperkaya ekstrak bunga balsam & pandan untuk mengembalikan kekuatan dan kesehatan rambut dari akar hingga ujungnya.
            </p>

            <div class="flex flex-col sm:flex-row items-start gap-6">
                <a href="#our-product" class="inline-flex items-center gap-2 group px-0 py-2 border-b border-rose text-rose hover:text-gold hover:border-gold transition-colors text-xs font-semibold tracking-widest uppercase">
                    Discover More <i data-lucide="arrow-down" class="w-4 h-4 group-hover:translate-y-1 transition-transform"></i>
                </a>
                <a href="./asset/laboratory document.pdf" target="_blank" class="inline-flex items-center gap-2 group px-6 py-3 bg-gold text-plum-dark hover:bg-cream hover:text-plum-dark transition-colors text-xs font-bold tracking-widest uppercase rounded-sm">
                    Lab Report <i data-lucide="file-text" class="w-4 h-4"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- OUR PRODUCT -->
    <section id="our-product" class="py-16 md:py-24 px-6 md:px-12 bg-plum-dark text-center">
        <div class="mb-16">
            <div class="section-divider" data-aos="fade-up">Our Product</div>
        </div>

        <div class="max-w-5xl mx-auto flex flex-col items-center gap-4">
            <!-- Hero Shot -->
            <div class="w-full max-w-lg overflow-hidden group" data-aos="fade-up">
                <img src="./asset/tb 1.jpg" alt="SEKAR Premium Product" class="w-full h-auto object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
            </div>

            <!-- Grid 3 -->
            <div class="w-full max-w-3xl grid grid-cols-3 gap-2 md:gap-4 mt-2">
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="100">
                    <img src="./asset/tb 3.jpg" alt="SEKAR Detail 1" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="200">
                    <img src="./asset/tb 4.jpg" alt="SEKAR Detail 2" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="300">
                    <img src="./asset/tb 5.jpg" alt="SEKAR Detail 3" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
            </div>
        </div>
    </section>

    <!-- JOURNEY OF SEKAR -->
    <section id="journey" class="py-16 md:py-24 px-6 md:px-12 bg-plum-mid text-center">
        <div class="mb-16">
            <div class="section-divider" data-aos="fade-up">Journey of SEKAR</div>
        </div>

        <div class="max-w-4xl mx-auto flex flex-col items-center gap-4">
            <!-- Grid 2x2 -->
            <div class="grid grid-cols-2 gap-2 md:gap-4 w-full">
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up">
                    <img src="./asset/step 1.jpg" alt="Step 1" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="100">
                    <img src="./asset/step 2.jpg" alt="Step 2" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="200">
                    <img src="./asset/step 3.jpg" alt="Step 3" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
                <div class="w-full aspect-square overflow-hidden group" data-aos="fade-up" data-aos-delay="300">
                    <img src="./asset/step 4.jpg" alt="Step 4" class="w-full h-full object-cover group-hover:scale-[1.04] transition-transform duration-700 ease-out" />
                </div>
            </div>

            <!-- Wide Image Bottom -->
            <div class="w-full overflow-hidden group mt-2 md:mt-4" data-aos="fade-up" data-aos-delay="400">
                <img src="./asset/tb 6.jpg" alt="Journey Conclusion" class="w-full h-auto aspect-[21/9] object-cover object-center group-hover:scale-[1.04] transition-transform duration-700 ease-out" onerror="this.src='./asset/tb 2.jpg'" />
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-8 md:py-12 bg-plum text-center flex justify-center items-center">
        <p class="font-sans text-xs md:text-sm text-cream/70 tracking-widest uppercase">
            © 2025 SEKAR. All rights reserved.
        </p>
    </footer>

</body>
</html>
